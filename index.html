<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baccarat Tracker V33 PRO+</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#0b0f17">
</head>
<body>

<header class="header">
  <div class="start">Start ₹<span id="start">30000</span></div>
  <div class="title">Live Bankroll</div>
  <div class="bankroll">₹<span id="bankroll">30000</span></div>
</header>

<section class="card">
  <h3>Next Round Risk</h3>
  <div class="riskbar"><div id="riskfill"></div></div>
</section>

<section class="card">
  <h3>Exposure</h3>
  <div id="exposure">P:1700 | B:1700 | Total:3400</div>
</section>

<section class="card">
  <h3>Last 5</h3>
  <div class="last">P1-B1 P7-B7 P8-B8 P9-B9 P6-B6</div>
</section>

<div class="content" id="tabcontent">
  <p style="text-align:center;">Play tab content area</p>
</div>

<nav class="tabs">
<button onclick="tab('play')">Play</button>
<button onclick="tab('board')">Board</button>
<button onclick="tab('history')">History</button>
<button onclick="tab('analytics')">Analytics</button>
<button onclick="tab('ladder')">Ladder</button>
<button onclick="tab('settings')">Settings</button>
</nav>

<script src="app.js"></script>
</body>
</html>
